name: Backup4App KeepAlive

on:
  schedule:
    # 每 6 小时运行一次 (你可以根据需要调整频率)
    - cron: '0 */6 * * *'
  workflow_dispatch: # 允许手动点击运行，方便测试

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Auto Redeploy
        env:
          # 在 GitHub Settings -> Secrets 中配置这两个变量
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
        run: python auto_redeploy.py
